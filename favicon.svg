<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Main face gradient (coral → gold, matching the app's primary button) -->
    <linearGradient id="face" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7aa8"/>
      <stop offset="100%" stop-color="#ffcb57"/>
    </linearGradient>
    <!-- Right side (darker for 3D depth) -->
    <linearGradient id="sideR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cc5a80"/>
      <stop offset="100%" stop-color="#cca040"/>
    </linearGradient>
    <!-- Bottom side -->
    <linearGradient id="sideB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b04870"/>
      <stop offset="100%" stop-color="#b08a35"/>
    </linearGradient>
    <!-- Subtle highlight -->
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- Background circle gradient -->
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#152240"/>
      <stop offset="100%" stop-color="#08111f"/>
    </radialGradient>
    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="62" fill="url(#bg)" stroke="rgba(183,229,255,0.2)" stroke-width="1.5"/>

  <!-- 3D letter "T" — built from polygons for extrusion effect -->
  <g filter="url(#shadow)">
    <!-- Bottom/right extrusion faces (drawn first, behind the front face) -->
    <!-- Bottom of top bar -->
    <polygon points="22,22 102,22 108,30 28,30" fill="url(#sideB)"/>
    <!-- Right of top bar -->
    <polygon points="102,22 108,30 108,50 102,42" fill="url(#sideR)"/>
    <!-- Bottom of vertical bar -->
    <polygon points="52,42 72,42 78,50 58,50" fill="url(#sideB)"/>
    <!-- Right of vertical bar -->
    <polygon points="72,42 78,50 78,114 72,106" fill="url(#sideR)"/>
    <!-- Bottom of vertical bar (base) -->
    <polygon points="52,106 72,106 78,114 58,114" fill="url(#sideB)"/>

    <!-- Front face of the T -->
    <!-- Top bar -->
    <rect x="22" y="14" width="80" height="20" rx="3" fill="url(#face)"/>
    <!-- Vertical bar -->
    <rect x="48" y="34" width="28" height="72" rx="3" fill="url(#face)"/>

    <!-- Shine overlay on front face -->
    <rect x="22" y="14" width="80" height="20" rx="3" fill="url(#shine)" opacity="0.6"/>
    <rect x="48" y="34" width="28" height="72" rx="3" fill="url(#shine)" opacity="0.3"/>
  </g>

  <!-- Tiny sparkle accents -->
  <circle cx="98" cy="18" r="2.5" fill="#fff" opacity="0.8"/>
  <circle cx="103" cy="25" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="30" cy="90" r="2" fill="#ffe082" opacity="0.6"/>
</svg>
