<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tiny Fingers</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png" />
    <link rel="apple-touch-icon" href="favicon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="app">
      <canvas id="canvas"></canvas>

      <button id="fullscreen-toggle" class="fullscreen-toggle" type="button" hidden>
        Go Full Screen
      </button>

      <section id="start-overlay" class="start-overlay">
        <div class="start-card">
          <p class="eyebrow">Tiny Fingers</p>
          <h1>Big keys,<br>bright colours,<br>happy typing.</h1>
          <p class="intro">
            Press any letter or number to<br>make it dance across the screen.
          </p>
          <div class="actions">
            <button id="start-fullscreen" class="action action-primary" type="button">
              Start Full Screen
            </button>
            <button id="start-windowed" class="action action-secondary" type="button">
              Start Here
            </button>
          </div>
          <p class="footnote">Symbols become surprise emojis.</p>
          <a href="https://github.com/hashmil/tinyfingers" target="_blank" rel="noopener" class="github-link" aria-label="View source on GitHub">
            <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          </a>
        </div>
      </section>

      <p id="stage-hint" class="stage-hint">Type letters, numbers, or symbols</p>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
